name: Fuzz Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install cargo-fuzz
        run: |
          rustup component add rust-src || true
          cargo install --locked cargo-fuzz || true

      - name: Build workspace
        run: cargo build --workspace --release

      - name: Build fuzz targets (if present)
        run: |
          if [ -d fuzz ]; then
            cd fuzz
            cargo fuzz build --all
          else
            echo "No fuzz directory found; skipping cargo-fuzz build"
          fi
