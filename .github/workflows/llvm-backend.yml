name: LLVM Backend CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  llvm-backend:
    name: Build and test LLVM backend (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system LLVM (Ubuntu example)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-14 llvm-14-dev libclang-14-dev clang-14

      - name: Expose LLVM prefix as LLVM_SYS_* variable
        run: |
          PREFIX=$(llvm-config --prefix)
          VER=$(llvm-config --version)
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2 | cut -c1)
          VAR="LLVM_SYS_${MAJOR}${MINOR}_PREFIX"
          echo "${VAR}=${PREFIX}" >> $GITHUB_ENV

      - name: Build & test with inkwell
        run: cargo test -p codegen-llvm --release --features with_inkwell,real_llvm -- --nocapture

      - name: Run LLVM perf acceptance gate
        run: cargo test -p codegen-llvm --release --features with_inkwell,real_llvm -- --ignored --nocapture

      - name: Validate MIR optimizations in release mode
        run: cargo test -p omni-compiler --release --test mir_optimize

  windows-llvm:
    name: Build and test LLVM backend (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (Windows example)
        shell: powershell
        run: |
          choco install -y llvm --version=14.0.6 || true
          $prefix = $null
          $installedPrefix = 'C:\Program Files\LLVM'
          if (Test-Path $installedPrefix) {
            $clang = Join-Path $installedPrefix 'bin\clang.exe'
            if (Test-Path $clang) {
              $verOut = & $clang --version
              if ($verOut -match '(\d+)\.(\d+)') {
                $maj = $Matches[1]
                if ($maj -eq '14') {
                  $prefix = $installedPrefix
                }
              }
            }
          }
          if (-not $prefix) {
            $download = Join-Path $PWD 'scripts\download-llvm-win.ps1'
            if (Test-Path $download) {
              $result = & $download -Versions @('14.0.6')
              if ($result -and $result.prefix) {
                $prefix = $result.prefix
              }
            }
          }
          if ($prefix -and (Test-Path $prefix)) {
            $verOut = & "$prefix\bin\clang.exe" --version
            Write-Output $verOut
            if ($verOut -match '(\d+)\.(\d+)') {
              $maj = $Matches[1]
              $min = $Matches[2]
              $varName = "LLVM_SYS_${maj}${min}_PREFIX"
              Add-Content -Path $env:GITHUB_ENV -Value "${varName}=${prefix}"
            }
          } else {
            Write-Error 'LLVM not found after install/download fallback'
          }

      - name: Build & test with inkwell
        shell: powershell
        run: cargo test -p codegen-llvm --release --features with_inkwell,real_llvm -- --nocapture

      - name: Run LLVM perf acceptance gate
        shell: powershell
        run: cargo test -p codegen-llvm --release --features with_inkwell,real_llvm -- --ignored --nocapture

      - name: Validate MIR optimizations in release mode
        shell: powershell
        run: cargo test -p omni-compiler --release --test mir_optimize
