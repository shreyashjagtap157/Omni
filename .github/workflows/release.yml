name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  release:
    name: Build and publish release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: omni-x86_64-unknown-linux-gnu
            ext: ''
          - os: windows-latest
            artifact_name: omni-x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            artifact_name: omni-x86_64-apple-darwin
            ext: ''
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      
      - name: Build release
        run: |
          cargo build -p omni-stage0 --release
      
      - name: Normalize binary (reproducible)
        env:
          SOURCE_DATE_EPOCH: '1600000000'
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell -Command "Get-Item target/release/omni-stage0.exe | ForEach-Object { $_.LastWriteTime = [DateTime]'2020-09-13T12:00:00' }"
          else
            touch -d @1600000000 target/release/omni-stage0
          fi
      
      - name: Package artifact
        shell: pwsh
        run: |
          $name = "${{ matrix.artifact_name }}"
          if ("${{ matrix.ext }}" -ne "") { $name += "${{ matrix.ext }}" }
          Compress-Archive -Path "target/release/omni-stage0${{ matrix.ext }}" -DestinationPath "$name.zip"
          Write-Host "Created $name.zip"
      
      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: '*.zip'

  create-release:
    name: Create GitHub release
    needs: release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi
          echo "VERSION=${{ steps.version.outputs.VERSION }}"
      
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          release_name: Omni v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            ## Omni Compiler Release v${{ steps.version.outputs.VERSION }}
            
            ### What's included:
            - Self-hosting compiler (Stage0)
            - Full compiler pipeline: lexer → parser → type checker → MIR → LIR → codegen
            - Multiple backends: Cranelift (dev), LLVM (release), WebAssembly
            - LSP language server
            
            ### Platforms:
            - Linux (x86_64)
            - Windows (x86_64)
            - macOS (x86_64)
            
            ### CI Status:
            All tests pass including self-hosting parity verification.
    
  publish-artifacts:
    name: Attach artifacts to release
    needs: [release, create-release]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.os }}
      
      - name: Upload to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: '*.zip'
          asset_content_type: application/zip